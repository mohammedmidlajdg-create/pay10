<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}
.container{
    text-align:center;
}
button{
    background:#0F9D58;
    color:#fff;
    border:none;
    padding:18px 40px;
    font-size:22px;
    border-radius:8px;
    cursor:pointer;
}
button:hover{
    background:#0b8043;
}
</style>

<script>
function getAmount() {
    const params = new URLSearchParams(window.location.search);
    return params.get("amount") || "10";
}

function payNow() {
    const amount = getAmount();

    const upiLink =
        "upi://pay?pa=mohammedmidlajkk0@okaxis" +
        "&pn=Mohammed%20Midlaj" +
        "&am=" + amount +
        "&cu=INR" +
        "&tn=Website%20Payment";

    window.location.href = upiLink;
}

window.onload = function () {
    payNow();
};
</script>

</head>

<body>

<div class="container">
<h2>Pay ₹<span id="amt"></span></h2>

<button onclick="payNow()">Pay Now</button>

</div>

<script>
document.getElementById("amt").innerText=getAmount();
</script>

</body>
</html>
